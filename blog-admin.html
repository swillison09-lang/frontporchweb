<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Blog Editor — Front Porch Web</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FAF5EC; --ink:#1F2A22; --soft:#4A554C; --green:#2F4A38;
    --amber:#E9973E; --amber-deep:#C9741F; --line:rgba(31,42,34,.14);
    --card:#fff; --danger:#a33;
    --serif:"Fraunces",Georgia,serif; --sans:"Inter",-apple-system,"Segoe UI",sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);background:var(--cream);color:var(--ink);line-height:1.55;font-size:15px}
  a{color:var(--green)}

  header{
    position:sticky;top:0;z-index:20;background:var(--green);color:#fff;
    padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  }
  header h1{font-family:var(--serif);font-size:17px;font-weight:500;margin-right:auto}
  header .who{font-size:13px;opacity:.85}

  .btn{
    border:none;cursor:pointer;font:inherit;font-weight:600;font-size:14px;
    padding:9px 18px;border-radius:999px;text-decoration:none;display:inline-block;
  }
  .btn-amber{background:var(--amber);color:#241708}
  .btn-amber:hover{background:#f2a854}
  .btn-green{background:var(--green);color:#fff}
  .btn-green:hover{background:#3d5f49}
  .btn-ghost{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.5)}
  .btn-ghost:hover{border-color:#fff}
  .btn-quiet{background:#eee9de;color:var(--ink)}
  .btn-quiet:hover{background:#e3ddd0}
  .btn-danger{background:transparent;color:var(--danger);font-size:13px;padding:6px 10px}
  .btn-danger:hover{background:rgba(170,51,51,.09);border-radius:8px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  main{max-width:1000px;margin:0 auto;padding:26px 20px 90px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:18px}
  .card h2{font-family:var(--serif);font-size:19px;font-weight:500;margin-bottom:4px}
  .muted{color:var(--soft);font-size:13.5px}

  label{display:block;font-size:12.5px;font-weight:600;color:var(--soft);margin:14px 0 4px}
  input[type=text],textarea,select{
    width:100%;font:inherit;font-size:15px;color:var(--ink);background:#fdfcf9;
    border:1px solid var(--line);border-radius:9px;padding:10px 12px;
  }
  input:focus,textarea:focus,select:focus{outline:2px solid var(--amber);border-color:transparent}
  textarea{resize:vertical;min-height:90px}
  #body{min-height:340px;font-family:ui-monospace,"Cascadia Code",Consolas,monospace;font-size:14px;line-height:1.6}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}

  /* sign-in */
  #gate{max-width:430px;margin:60px auto;text-align:center}
  #gate .card{padding:30px 26px}
  #gate h2{font-size:22px;margin-bottom:8px}

  /* post list */
  .post-row{
    display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);
  }
  .post-row:last-child{border-bottom:none}
  .post-row .t{font-weight:600;margin-right:auto}
  .post-row .t small{display:block;font-weight:400;color:var(--soft);font-size:12.5px}
  .pill{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:999px}
  .pill.published{background:#e2efe4;color:#2c5c39}
  .pill.draft{background:#f3ece0;color:#8a6a2f}

  /* editor split */
  .split{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .preview{
    background:#fdfcf9;border:1px solid var(--line);border-radius:9px;padding:16px;
    min-height:340px;overflow-wrap:anywhere;
  }
  .preview h1,.preview h2,.preview h3{font-family:var(--serif);font-weight:500;margin:14px 0 6px;line-height:1.2}
  .preview h1{font-size:24px} .preview h2{font-size:20px} .preview h3{font-size:17px}
  .preview p{margin:0 0 10px}
  .preview ul,.preview ol{margin:0 0 10px 20px}
  .preview img{max-width:100%;border-radius:8px;margin:8px 0}
  .preview blockquote{border-left:3px solid var(--amber);padding-left:12px;color:var(--soft);margin:0 0 10px}
  .preview code{background:#efe9dd;padding:1px 5px;border-radius:4px;font-size:.9em}
  .preview a{color:var(--green)}

  .cover{margin-top:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .cover img{width:118px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}

  .bar{
    position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);
    padding:12px 20px;display:flex;gap:10px;align-items:center;z-index:15;
  }
  .bar .status{margin-right:auto;font-size:13px;color:var(--soft)}

  .toast{
    position:fixed;right:18px;bottom:74px;z-index:40;background:var(--ink);color:var(--cream);
    padding:11px 16px;border-radius:10px;font-size:13.5px;box-shadow:0 8px 24px rgba(0,0,0,.22);
    opacity:0;transform:translateY(6px);transition:opacity .18s,transform .18s;pointer-events:none;
  }
  .toast.show{opacity:1;transform:none}
  .toast.err{background:#7d2b2b}

  .hidden{display:none !important}
  @media (max-width:780px){
    .split,.row{grid-template-columns:1fr}
    .preview{min-height:180px}
  }
</style>
</head>
<body>

<header>
  <h1>Front Porch Web — Blog Editor</h1>
  <span class="who" id="who"></span>
  <button class="btn btn-ghost hidden" id="signOut">Sign out</button>
</header>

<!-- ── signed out ─────────────────────────────────────────────── -->
<div id="gate" class="hidden">
  <div class="card">
    <h2>Sign in to write</h2>
    <p class="muted">Use the email address your blog access was granted to.</p>
    <button class="btn btn-green" id="googleBtn" style="width:100%;margin-top:18px">Continue with Google</button>
    <div style="margin-top:16px">
      <label for="magicEmail" style="text-align:left">Or get a sign-in link by email</label>
      <input type="text" id="magicEmail" placeholder="you@example.com" autocomplete="email">
      <button class="btn btn-quiet" id="magicBtn" style="width:100%;margin-top:10px">Email me a link</button>
    </div>
    <p class="muted" id="gateMsg" style="margin-top:14px"></p>
  </div>
</div>

<!-- ── signed in ──────────────────────────────────────────────── -->
<main id="app" class="hidden">

  <!-- no access -->
  <div class="card hidden" id="noAccess">
    <h2>No blog access yet</h2>
    <p class="muted" id="noAccessMsg"></p>
  </div>

  <!-- site picker + post list -->
  <div class="card hidden" id="listCard">
    <div style="display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap">
      <div style="flex:1;min-width:220px">
        <label for="siteSel" style="margin-top:0">Website</label>
        <select id="siteSel"></select>
      </div>
      <button class="btn btn-amber" id="newBtn">+ New post</button>
    </div>
    <div id="posts" style="margin-top:18px"></div>
  </div>

  <!-- editor -->
  <div class="card hidden" id="editCard">
    <h2 id="editTitle">New post</h2>
    <p class="muted" id="editFor"></p>

    <label for="title">Title</label>
    <input type="text" id="title" placeholder="A day at the shop">

    <div class="row">
      <div>
        <label for="slug">Web address (auto-filled)</label>
        <input type="text" id="slug" placeholder="a-day-at-the-shop">
      </div>
      <div>
        <label for="author">Written by</label>
        <input type="text" id="author" placeholder="Ashley">
      </div>
    </div>

    <label for="excerpt">Short summary <span style="font-weight:400">— shown in the post list</span></label>
    <textarea id="excerpt" rows="2" placeholder="One or two sentences about this post."></textarea>

    <label>Cover photo</label>
    <div class="cover">
      <img id="coverImg" class="hidden" alt="Cover photo">
      <button class="btn btn-quiet" id="coverBtn">Choose photo</button>
      <button class="btn btn-danger hidden" id="coverClear">Remove</button>
      <span class="muted" id="coverMsg"></span>
      <input type="file" id="coverFile" accept="image/*" class="hidden">
    </div>

    <label for="body">Post <span style="font-weight:400">— **bold**, *italic*, # Heading, - list, [link](https://…)</span></label>
    <div class="split">
      <textarea id="body" placeholder="Write your post here…"></textarea>
      <div class="preview" id="preview"></div>
    </div>
  </div>
</main>

<div class="bar hidden" id="bar">
  <span class="status" id="status"></span>
  <button class="btn btn-quiet" id="backBtn">Back to posts</button>
  <button class="btn btn-danger hidden" id="deleteBtn">Delete</button>
  <button class="btn btn-quiet" id="saveBtn">Save draft</button>
  <button class="btn btn-amber" id="publishBtn">Publish</button>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/r2-upload.js"></script>
<script src="js/blog-admin.js"></script>
</body>
</html>
