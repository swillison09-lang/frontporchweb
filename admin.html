<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Front Porch Web — Content Editor</title>
<style>
  :root {
    --cream:#FAF5EC; --ink:#1F2A22; --soft:#4A554C; --green:#2F4A38;
    --amber:#E9973E; --amber-deep:#C9741F; --line:rgba(31,42,34,.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,"Segoe UI",Inter,sans-serif; background:var(--cream); color:var(--ink); line-height:1.5; }
  header {
    position:sticky; top:0; z-index:10; background:var(--green); color:#fff;
    padding:14px 24px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  }
  header h1 { font-size:17px; font-weight:600; margin-right:auto; }
  header .status { font-size:12.5px; opacity:.8; }
  .btn {
    border:none; cursor:pointer; font-weight:600; font-size:14px;
    padding:9px 18px; border-radius:999px; text-decoration:none; display:inline-block;
  }
  .btn-amber { background:var(--amber); color:#241708; }
  .btn-amber:hover { background:#f2a854; }
  .btn-outline { background:transparent; color:#fff; border:1.5px solid rgba(255,255,255,.5); }
  .btn-outline:hover { border-color:#fff; }
  main { max-width:860px; margin:0 auto; padding:28px 20px 80px; }
  .hint { font-size:13.5px; color:var(--soft); margin-bottom:24px; }
  section {
    background:#fff; border:1px solid var(--line); border-radius:14px;
    padding:22px; margin-bottom:20px;
  }
  section > h2 {
    font-size:13px; text-transform:uppercase; letter-spacing:.1em;
    color:var(--amber-deep); margin-bottom:16px;
  }
  label { display:block; font-size:12.5px; font-weight:600; color:var(--soft); margin:12px 0 4px; }
  input[type=text], textarea {
    width:100%; font:inherit; font-size:14.5px; color:var(--ink);
    border:1px solid var(--line); border-radius:8px; padding:9px 12px; background:#fdfcf9;
  }
  input:focus, textarea:focus, select:focus { outline:2px solid var(--amber); border-color:transparent; }
  textarea { resize:vertical; min-height:64px; }
  select { font:inherit; font-size:14px; padding:8px 10px; border:1px solid var(--line); border-radius:8px; background:#fdfcf9; }
  .item {
    border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:12px;
    background:#fbf9f4; position:relative;
  }
  .item .remove {
    position:absolute; top:10px; right:10px; border:none; background:none; cursor:pointer;
    color:#a33; font-size:13px; font-weight:600; padding:4px 8px; border-radius:6px;
  }
  .item .remove:hover { background:rgba(170,51,51,.1); }
  .add {
    border:1.5px dashed var(--line); background:none; cursor:pointer; width:100%;
    padding:10px; border-radius:10px; font-weight:600; font-size:13.5px; color:var(--green);
  }
  .add:hover { border-color:var(--green); background:rgba(47,74,56,.04); }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:0 14px; }
  .check { display:flex; align-items:center; gap:8px; margin-top:12px; font-size:13.5px; font-weight:600; color:var(--soft); }
  @media (max-width:600px){ .row { grid-template-columns:1fr; } }
</style>
</head>
<body>
<header>
  <h1>Front Porch Web — Content Editor</h1>
  <span class="status" id="status">Loading…</span>
  <a class="btn btn-outline" href="index.html?preview=1" target="_blank">Preview site</a>
  <button class="btn btn-amber" id="download">Download updated JSON</button>
</header>
<main>
  <p class="hint">
    Changes autosave to this browser as a draft — the <b>Preview site</b> button shows the draft live.
    To publish, click <b>Download updated JSON</b> and replace <code>content.json</code> on the server with the downloaded file.
  </p>
  <div id="form"></div>
</main>

<script>
const DRAFT_KEY = "fpw-content-draft";
let data = null;

const $ = (sel, root = document) => root.querySelector(sel);
const el = (tag, attrs = {}, ...kids) => {
  const n = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === "class") n.className = v;
    else if (k.startsWith("on")) n.addEventListener(k.slice(2), v);
    else n.setAttribute(k, v);
  });
  kids.forEach(k => n.append(k));
  return n;
};

function field(labelText, value, onInput, { multiline } = {}) {
  const input = multiline
    ? el("textarea", { oninput: e => { onInput(e.target.value); save(); } })
    : el("input", { type: "text", oninput: e => { onInput(e.target.value); save(); } });
  input.value = value ?? "";
  return el("div", {}, el("label", {}, labelText), input);
}

function linkFields(obj) {
  return el("div", { class: "row" },
    field("Label", obj.label, v => obj.label = v),
    field("Link (href)", obj.href, v => obj.href = v));
}

function listEditor(title, arr, makeItem, makeNew) {
  const wrap = el("section", {}, el("h2", {}, title));
  const list = el("div", {});
  const render = () => {
    list.innerHTML = "";
    arr.forEach((item, i) => {
      const box = el("div", { class: "item" });
      box.append(el("button", {
        class: "remove",
        onclick: () => { arr.splice(i, 1); save(); render(); }
      }, "✕ remove"));
      box.append(makeItem(item));
      list.append(box);
    });
  };
  render();
  wrap.append(list, el("button", {
    class: "add",
    onclick: () => { arr.push(makeNew()); save(); render(); }
  }, "+ Add item"));
  return wrap;
}

function buildForm() {
  const f = $("#form");
  f.innerHTML = "";

  // Hero
  const hero = el("section", {}, el("h2", {}, "Hero"));
  hero.append(
    field("Eyebrow (small line above headline)", data.hero.eyebrow, v => data.hero.eyebrow = v),
    field("Headline", data.hero.headline, v => data.hero.headline = v),
    field("Headline accent (italic second line)", data.hero.headlineAccent, v => data.hero.headlineAccent = v),
    field("Subheadline", data.hero.sub, v => data.hero.sub = v, { multiline: true }),
    field("Small note under buttons", data.hero.note, v => data.hero.note = v),
    el("label", {}, "Primary button"), linkFields(data.hero.primaryCta),
    el("label", {}, "Secondary button"), linkFields(data.hero.secondaryCta)
  );
  f.append(hero);

  // Values
  f.append(listEditor("Trust points (3 cards under hero)", data.values,
    item => el("div", {},
      field("Title", item.title, v => item.title = v),
      field("Text", item.body, v => item.body = v, { multiline: true })),
    () => ({ title: "New point", body: "" })));

  // Work
  const workHead = el("section", {}, el("h2", {}, "Our Work — headings"));
  workHead.append(
    field("Eyebrow", data.work.eyebrow, v => data.work.eyebrow = v),
    field("Heading", data.work.heading, v => data.work.heading = v),
    field("Subheading", data.work.sub, v => data.work.sub = v, { multiline: true }));
  f.append(workHead);

  f.append(listEditor("Our Work — demo cards", data.work.cards,
    item => {
      const themeSel = el("select", { onchange: e => { item.theme = e.target.value; save(); } });
      ["family", "lawn", "plumbing", "athlete"].forEach(t => {
        const o = el("option", { value: t }, t);
        if (item.theme === t) o.selected = true;
        themeSel.append(o);
      });
      return el("div", {},
        field("Title", item.title, v => item.title = v),
        field("Tag (e.g. Local Business)", item.tag, v => item.tag = v),
        field("Description", item.description, v => item.description = v, { multiline: true }),
        field("Link (href)", item.href, v => item.href = v),
        field("Screenshot image (e.g. assets/demos/site.png — leave blank for placeholder)", item.image, v => item.image = v),
        field("Screenshot alt text", item.imageAlt, v => item.imageAlt = v),
        el("label", {}, "Color theme (used behind the screenshot)"), themeSel);
    },
    () => ({ title: "New demo", tag: "Local Business", description: "", href: "#", theme: "family", image: "", imageAlt: "" })));

  // Process
  const procHead = el("section", {}, el("h2", {}, "Process — headings"));
  procHead.append(
    field("Eyebrow", data.process.eyebrow, v => data.process.eyebrow = v),
    field("Heading", data.process.heading, v => data.process.heading = v));
  f.append(procHead);

  f.append(listEditor("Process — steps", data.process.steps,
    item => el("div", {},
      field("Title", item.title, v => item.title = v),
      field("Text", item.body, v => item.body = v, { multiline: true })),
    () => ({ title: "New step", body: "" })));

  // Pricing
  const priceHead = el("section", {}, el("h2", {}, "Pricing — headings"));
  priceHead.append(
    field("Eyebrow", data.pricing.eyebrow, v => data.pricing.eyebrow = v),
    field("Heading", data.pricing.heading, v => data.pricing.heading = v),
    field("Subheading", data.pricing.sub, v => data.pricing.sub = v));
  f.append(priceHead);

  f.append(listEditor("Pricing — plans", data.pricing.tiers,
    item => {
      const featured = el("input", { type: "checkbox", onchange: e => { item.featured = e.target.checked; save(); } });
      featured.checked = !!item.featured;
      return el("div", {},
        el("div", { class: "row" },
          field("Plan name", item.name, v => item.name = v),
          field("Price (e.g. $700)", item.price, v => item.price = v)),
        field("Term (e.g. one-time)", item.term, v => item.term = v),
        field("Features (one per line)", item.features.join("\n"),
          v => item.features = v.split("\n").filter(Boolean), { multiline: true }),
        el("label", {}, "Button"), linkFields(item.cta),
        el("label", { class: "check" }, featured, "Highlight this plan (dark green card)"));
    },
    () => ({ name: "New plan", price: "$0", term: "one-time", features: [], cta: { label: "Get Started", href: "portal.html" }, featured: false })));

  // About
  const about = el("section", {}, el("h2", {}, "About"));
  about.append(
    field("Eyebrow", data.about.eyebrow, v => data.about.eyebrow = v),
    field("Heading", data.about.heading, v => data.about.heading = v),
    field("Photo (e.g. assets/sean.jpg — leave blank to hide)", data.about.photo, v => data.about.photo = v),
    field("Photo alt text", data.about.photoAlt, v => data.about.photoAlt = v),
    field("Story", data.about.body, v => data.about.body = v, { multiline: true }),
    field("Signature", data.about.signature, v => data.about.signature = v));
  f.append(about);

  // CTA + footer + nav
  const cta = el("section", {}, el("h2", {}, "Bottom call-to-action"));
  cta.append(
    field("Heading", data.cta.heading, v => data.cta.heading = v),
    field("Text", data.cta.body, v => data.cta.body = v, { multiline: true }),
    el("label", {}, "Primary button"), linkFields(data.cta.primaryCta),
    field("Contact email", data.cta.email, v => data.cta.email = v));
  f.append(cta);

  const misc = el("section", {}, el("h2", {}, "Navigation & footer"));
  misc.append(
    field("Brand name", data.nav.brand, v => data.nav.brand = v),
    el("label", {}, "Nav button"), linkFields(data.nav.cta),
    field("Footer copyright line", data.footer.copyright, v => data.footer.copyright = v),
    field("Page title (browser tab)", data.meta.title, v => data.meta.title = v),
    field("Search description", data.meta.description, v => data.meta.description = v, { multiline: true }));
  f.append(misc);
}

let saveTimer;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localStorage.setItem(DRAFT_KEY, JSON.stringify(data));
    $("#status").textContent = "Draft saved " + new Date().toLocaleTimeString();
  }, 250);
}

$("#download").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = el("a", { href: URL.createObjectURL(blob), download: "content.json" });
  document.body.append(a); a.click(); a.remove();
});

(async function init() {
  const draft = localStorage.getItem(DRAFT_KEY);
  if (draft) {
    try { data = JSON.parse(draft); } catch (e) { data = null; }
  }
  if (!data) data = await (await fetch("content.json")).json();
  $("#status").textContent = draft ? "Loaded saved draft" : "Loaded published content";
  buildForm();
})();
</script>
</body>
</html>
